// Internal message-bus payloads (the rust-messenger ring). These are encoded
// with buffa and bridged to the bus's Message/ExtendedMessage traits in the
// soulrust-proto crate. Migrated from the hand-written Rust structs in
// crates/soulrust/src/messages.rs, one batch at a time.
syntax = "proto3";

package soulrust.bus.v1;

// peer_net → ui: a notable serving event (a peer connected, a browse served,
// the listener bound, …). Just a log line — no bulk data.
message PeerActivity {
  string note = 1;
}

// --- Batch 1: flat request/response + event messages -----------------------

message HttpHtml {
  uint64 corr = 1;
  string html = 2;
}

message ExtractRequest {
  uint64 corr = 1;
  string input = 2;
}

message GetConfigReq {
  uint64 corr = 1;
}

message ApplyUpdateReq {
  uint64 corr = 1;
}

message BrowseUser {
  uint64 corr = 1;
  string username = 2;
}

message BrowseAccepted {
  uint64 corr = 1;
  optional string error = 2;
}

message BrowseFailed {
  string username = 1;
  string reason = 2;
}

message BrowseRenderReq {
  uint64 corr = 1;
}

message BrowseHtml {
  uint64 corr = 1;
  string html = 2;
}

message IncomingSearch {
  string username = 1;
  uint32 token = 2;
  string query = 3;
}

message SetExcludedPhrases {
  repeated string phrases = 1;
}

message RelayDistribSearch {
  string username = 1;
  uint32 token = 2;
  string query = 3;
}

message DistribSpeedLimits {
  uint32 min_speed = 1;
  uint32 ratio = 2;
}

message StartDownload {
  string username = 1;
  string filename = 2;
  uint64 size = 3;
  // "Organize" option (bulk playlist downloads): a destination subfolder under
  // the download dir (empty = none) and a filename prefix to prepend, e.g. a
  // zero-padded track number "01 " (empty = none).
  string subdir = 4;
  string prefix = 5;
}

message CancelDownload {
  string username = 1;
  string filename = 2;
}

message PauseDownload {
  string username = 1;
  string filename = 2;
}

message DownloadComplete {
  string username = 1;
  string filename = 2;
  string path = 3;
}

message DownloadFailed {
  string username = 1;
  string filename = 2;
  string reason = 3;
}

message DownloadQueuePosition {
  string username = 1;
  string filename = 2;
  uint32 place = 3;
}

message ResolveUploadPeer {
  string username = 1;
}

message UploadStarted {
  string username = 1;
  string filename = 2;
  uint64 size = 3;
}

message TransferProgress {
  string username = 1;
  string filename = 2;
  uint64 bytes = 3;
  uint64 size = 4;
  bool upload = 5;
}

message UploadComplete {
  string username = 1;
  string filename = 2;
}

message UploadFailed {
  string username = 1;
  string filename = 2;
  string reason = 3;
}

message StartedSearch {
  uint32 token = 1;
  string query = 2;
}

message StartSearchResult {
  uint64 corr = 1;
  repeated StartedSearch started = 2;
  optional string error = 3;
}

message BrowseFile {
  string name = 1;
  uint64 size = 2;
}

message BrowseDir {
  string path = 1;
  repeated BrowseFile files = 2;
}

message BrowseListing {
  string username = 1;
  repeated BrowseDir directories = 2;
  uint64 total_files = 3;
  bool truncated = 4;
}

message SearchResultFile {
  string name = 1;
  uint64 size = 2;
  optional uint32 bitrate = 3;
  optional uint32 length = 4;
  bool vbr = 5;
  optional uint32 sample_rate = 6;
  optional uint32 bit_depth = 7;
}

message SearchResultReceived {
  uint32 token = 1;
  string username = 2;
  bool free_slots = 3;
  uint32 upload_speed = 4;
  uint32 in_queue = 5;
  repeated SearchResultFile files = 6;
}

// Ask the UI to drop a search card — the per-card close button, and the
// "search again" flow which removes the old card before starting the new one.
message RemoveSearch {
  uint32 token = 1;
}

// --- Batch 2: peer address (location) messages. `port` is uint32 (proto has no
// u16); call sites cast to/from u16 at the soulseek-proto boundary. ----------

message PeerBrowseConnect {
  string username = 1;
  string ip = 2;
  uint32 port = 3;
}

message PeerPierce {
  string username = 1;
  string ip = 2;
  uint32 port = 3;
  uint32 token = 4;
}

message PeerPierceFile {
  string username = 1;
  string ip = 2;
  uint32 port = 3;
  uint32 token = 4;
}

message PeerPierceDistrib {
  string username = 1;
  string ip = 2;
  uint32 port = 3;
  uint32 token = 4;
}

message PeerDownloadConnect {
  string username = 1;
  string ip = 2;
  uint32 port = 3;
  string filename = 4;
  uint64 size = 5;
  // "Organize" option: destination subfolder + filename prefix (see StartDownload).
  string subdir = 6;
  string prefix = 7;
}

message PeerUploadConnect {
  string username = 1;
  string ip = 2;
  uint32 port = 3;
}

message PeerDistribConnect {
  string username = 1;
  string ip = 2;
  uint32 port = 3;
}

// --- Batch 3: raw frame bytes + the updater artifact path ------------------

message NetRx {
  bytes payload = 1;
}

message NetTx {
  bytes frame = 1;
}

// `artifact` is a filesystem path (was PathBuf); call sites convert to/from
// PathBuf via to_string_lossy / PathBuf::from.
message UpdateDownloaded {
  string latest = 1;
  string artifact = 2;
}

// --- Batch 4: data-carrying enums, flattened to (kind enum + payload fields).
// Modelled flat rather than as oneof so match/construct sites stay simple. ---

enum NetConnKind {
  NET_CONN_KIND_UNSPECIFIED = 0;
  NET_CONN_CONNECTED = 1;
  NET_CONN_FAILED = 2;
  NET_CONN_CLOSED = 3;
}

message NetConn {
  NetConnKind kind = 1;
  string reason = 2; // FAILED / CLOSED
}

enum SessionEventKind {
  SESSION_EVENT_KIND_UNSPECIFIED = 0;
  SESSION_CONNECTING = 1;
  SESSION_LOGGED_IN = 2;
  SESSION_LOGIN_FAILED = 3;
  SESSION_SEARCH_STARTED = 4;
  SESSION_SEARCH_BROADCAST_SEEN = 5;
  SESSION_DISCONNECTED = 6;
  SESSION_PROTOCOL_NOTE = 7;
}

message SessionEvent {
  SessionEventKind kind = 1;
  string greeting = 2;   // LOGGED_IN
  string own_ip = 3;     // LOGGED_IN
  string reason = 4;     // LOGIN_FAILED / DISCONNECTED
  uint32 token = 5;      // SEARCH_STARTED
  string query = 6;      // SEARCH_STARTED / SEARCH_BROADCAST_SEEN
  string username = 7;   // SEARCH_BROADCAST_SEEN
  string note = 8;       // PROTOCOL_NOTE
  string folder = 9;     // SEARCH_STARTED (organize: destination subfolder)
  string prefix = 10;    // SEARCH_STARTED (organize: filename prefix)
  string group = 11;     // SEARCH_STARTED (bulk display group: playlist name)
  uint32 track = 12;     // SEARCH_STARTED (bulk display: 1-based track index)
}

enum UpdaterStatusKind {
  UPDATER_STATUS_KIND_UNSPECIFIED = 0;
  UPDATER_CHECKING = 1;
  UPDATER_UP_TO_DATE = 2;
  UPDATER_AVAILABLE = 3;
  UPDATER_DOWNLOADING = 4;
  UPDATER_READY_TO_APPLY = 5;
  UPDATER_RESTART_REQUIRED = 6;
  UPDATER_FAILED = 7;
  UPDATER_SKIPPED = 8;
}

message UpdaterStatusChanged {
  UpdaterStatusKind kind = 1;
  string current = 2;  // UP_TO_DATE
  string latest = 3;   // AVAILABLE / DOWNLOADING / READY_TO_APPLY / RESTART_REQUIRED
  string error = 4;    // FAILED
  string reason = 5;   // SKIPPED
}

enum PageKind {
  PAGE_KIND_UNSPECIFIED = 0;
  PAGE_INDEX = 1;
  PAGE_STATUS_FRAGMENT = 2;
  PAGE_SEARCHES_FRAGMENT = 3;
  PAGE_CONFIG_FORM = 4;
  PAGE_ACCOUNT_STATUS = 5;
  PAGE_DOWNLOADS = 6;
  PAGE_DOWNLOADS_FRAGMENT = 7;
  PAGE_UPLOADS = 8;
  PAGE_UPLOADS_FRAGMENT = 9;
  PAGE_SORT_SEARCHES = 10;
  PAGE_FILTER_BITRATE = 11;
}

message Page {
  PageKind kind = 1;
  string sort_key = 2;  // SORT_SEARCHES
  uint32 min_bitrate = 3; // FILTER_BITRATE
}

message HttpRender {
  uint64 corr = 1;
  Page page = 2;
}

// --- Batch 5: Result<(), String> responses (error unset = Ok) --------------

message SetConfigResult {
  uint64 corr = 1;
  optional string error = 2;
}

message ApplyUpdateResult {
  uint64 corr = 1;
  optional string error = 2;
}

// --- Batch 6: search jobs (extract) ----------------------------------------

message SearchJob {
  optional string artist = 1;
  optional string title = 2;
  optional string album = 3;
  optional string raw_query = 4;
  // "Organize" option: destination subfolder + filename prefix for the file
  // this search downloads (empty = none). Set by the API edge when the user
  // opts to organize a playlist into a numbered folder.
  string folder = 5;
  string prefix = 6;
  // Display grouping for a bulk (playlist/album) search, independent of the
  // organize option: the collection name and this track's 1-based position.
  // Empty group / 0 track = a standalone search.
  string group = 7;
  uint32 track = 8;
}

message Job {
  string source_label = 1;
  repeated SearchJob searches = 2;
  // The playlist/album title, when the source is one (empty otherwise). Used as
  // the destination subfolder name for the "organize" download option.
  string folder = 3;
}

message ExtractResult {
  uint64 corr = 1;
  Job job = 2;               // present on success
  optional string error = 3; // present on failure
}

message StartSearch {
  uint64 corr = 1;
  string source_label = 2;
  repeated SearchJob jobs = 3;
}

// --- Batch 7: the Config trio (mirror of the serde Config; converted at the
// bus boundary, the Rust Config stays for YAML + field reads). ---------------

message ServerConfig {
  string host = 1;
  uint32 port = 2; // u16 in Rust
  string username = 3;
  string password = 4;
  uint32 listen_port = 5;
}

message SpotifyConfig {
  optional string client_id = 1;
  optional string client_secret = 2;
  // OAuth Authorization Code refresh token, obtained after the user logs in via
  // /spotify/login. Used to mint short-lived user access tokens for the Web API
  // (playlist reads require a user token; Client Credentials is no longer enough).
  optional string refresh_token = 3;
}

message UpdateConfig {
  bool enabled = 1;
  bool auto_apply = 2;
  string repo = 3;
}

message UiConfig {
  string bind_addr = 1;
  // Open the web UI in the OS default browser on startup. optional so an unset
  // value can default to true (proto3 bools default to false). Off for headless
  // / server installs.
  optional bool open_browser = 2;
}

message SharingConfig {
  repeated string folders = 1;
  string download_dir = 2;
  string incomplete_dir = 3;
  uint32 upload_slots = 4;
  bool fifo_queue = 5;
  bool respond_to_searches = 6;
  uint32 max_search_results = 7;
  uint32 min_result_files = 8;
  uint32 min_peer_upload_speed = 9;
  uint32 max_peer_queue_length = 10;
  uint32 max_download_speed = 11;
  uint32 max_upload_speed = 12;
  bool organize_downloads = 13;
}

message Config {
  ServerConfig server = 1;
  SpotifyConfig spotify = 2;
  UpdateConfig update = 3;
  UiConfig ui = 4;
  SharingConfig sharing = 5;
}

message ConfigSnapshot {
  uint64 corr = 1;
  Config config = 2;
}

message SetConfigReq {
  uint64 corr = 1;
  Config config = 2;
}

message ConfigChanged {
  Config config = 1;
}
